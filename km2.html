<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>КМ2 · Подготовка</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0d0b;
    --bg-2: #161412;
    --bg-3: #1d1a17;
    --border: #2a2622;
    --border-2: #3a342d;
    --text: #ede7dc;
    --text-dim: #998f7f;
    --text-faint: #5d5650;
    --accent: #c8ff2b;
    --accent-dim: #9bc418;
    --warn: #ff8c42;
    --err: #ff4d6d;
    --ok: #c8ff2b;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist', system-ui, sans-serif;
    font-feature-settings: 'ss01', 'cv11';
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body {
    background-image:
      radial-gradient(ellipse at top left, rgba(200,255,43,0.04), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(255,140,66,0.03), transparent 50%);
    background-attachment: fixed;
  }
  .app { max-width: 880px; margin: 0 auto; padding: 32px 24px 80px; }

  /* Header */
  .header {
    display: flex; justify-content: space-between; align-items: baseline;
    padding-bottom: 24px; margin-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: 38px;
    letter-spacing: -0.02em;
    font-variation-settings: 'opsz' 96;
  }
  .header h1 .accent { color: var(--accent); font-style: italic; font-weight: 400; }
  .header .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.1em;
  }

  /* Stats bar */
  .stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
    background: var(--border); border: 1px solid var(--border);
    margin-bottom: 32px;
  }
  .stat { background: var(--bg-2); padding: 14px 16px; }
  .stat .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px; font-weight: 700; color: var(--accent);
  }
  .stat .lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px;
  }

  /* Mode cards */
  .modes { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .mode {
    background: var(--bg-2); border: 1px solid var(--border);
    padding: 24px; cursor: pointer; text-align: left;
    color: var(--text); font-family: inherit;
    transition: all 0.15s ease;
    position: relative; overflow: hidden;
  }
  .mode:hover {
    border-color: var(--border-2);
    background: var(--bg-3);
    transform: translateY(-2px);
  }
  .mode:hover .mode-arrow { transform: translateX(4px); color: var(--accent); }
  .mode .mode-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-faint);
    margin-bottom: 8px;
  }
  .mode .mode-title {
    font-family: 'Fraunces', serif;
    font-size: 22px; font-weight: 600; margin-bottom: 6px;
    font-variation-settings: 'opsz' 36;
  }
  .mode .mode-desc {
    font-size: 13px; color: var(--text-dim); line-height: 1.4;
  }
  .mode-arrow {
    position: absolute; top: 24px; right: 24px;
    color: var(--text-faint); transition: all 0.15s ease;
    font-family: 'JetBrains Mono', monospace;
  }
  .mode.featured {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, var(--bg-3), var(--bg-2));
    border-color: var(--accent-dim);
  }
  .mode.featured .mode-title { color: var(--accent); }

  /* Quiz screens */
  .screen { display: none; }
  .screen.active { display: block; }

  .quiz-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .quiz-back {
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); font-family: 'JetBrains Mono', monospace;
    font-size: 12px; padding: 6px 12px; cursor: pointer;
    transition: all 0.15s ease;
  }
  .quiz-back:hover { color: var(--accent); border-color: var(--border-2); }
  .quiz-progress {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--text-dim);
  }
  .quiz-progress .cur { color: var(--accent); font-weight: 700; }

  .progress-bar {
    height: 3px; background: var(--bg-3); margin-bottom: 32px;
    border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    transition: width 0.3s ease;
  }

  /* Question card */
  .qcard {
    background: var(--bg-2); border: 1px solid var(--border);
    padding: 40px 36px; min-height: 280px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .qtype {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 16px;
  }
  .qtext {
    font-family: 'Fraunces', serif;
    font-size: 32px; font-weight: 500; line-height: 1.25;
    letter-spacing: -0.01em;
    font-variation-settings: 'opsz' 72;
  }
  .qtext.small {
    font-size: 18px; line-height: 1.5;
  }
  .qhint {
    margin-top: 14px;
    font-size: 13px; color: var(--text-faint);
    font-style: italic;
  }

  /* Input */
  .answer-area { margin-top: 28px; }
  .ainput {
    width: 100%; background: var(--bg);
    border: 1px solid var(--border-2);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px; padding: 14px 16px;
    transition: border-color 0.15s ease;
  }
  .ainput:focus {
    outline: none; border-color: var(--accent);
  }
  .ainput.correct { border-color: var(--ok); }
  .ainput.wrong { border-color: var(--err); }

  /* Buttons */
  .btn-row {
    display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap;
  }
  .btn {
    background: var(--bg-2); border: 1px solid var(--border-2);
    color: var(--text); font-family: 'Geist', sans-serif;
    font-size: 14px; font-weight: 500;
    padding: 10px 20px; cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary {
    background: var(--accent); color: var(--bg); border-color: var(--accent);
    font-weight: 600;
  }
  .btn.primary:hover { background: var(--accent-dim); border-color: var(--accent-dim); color: var(--bg); }
  .btn.ghost { border-color: var(--border); color: var(--text-dim); }
  .btn.ok { border-color: var(--ok); color: var(--ok); }
  .btn.err { border-color: var(--err); color: var(--err); }

  /* Feedback */
  .feedback {
    margin-top: 20px; padding: 16px 18px;
    border-left: 3px solid var(--border-2);
    background: var(--bg-3);
    font-size: 14px;
  }
  .feedback.correct { border-color: var(--ok); }
  .feedback.wrong { border-color: var(--err); }
  .feedback .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-faint); margin-bottom: 6px;
  }
  .feedback .ans {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px; color: var(--text);
  }
  .feedback .ans.accent { color: var(--accent); font-weight: 700; }

  /* MC options */
  .options { display: grid; gap: 10px; margin-top: 24px; }
  .opt {
    background: var(--bg); border: 1px solid var(--border-2);
    color: var(--text); font-family: inherit;
    font-size: 14px; padding: 14px 18px;
    text-align: left; cursor: pointer; line-height: 1.5;
    transition: all 0.15s ease;
    display: flex; gap: 14px; align-items: flex-start;
  }
  .opt:hover { border-color: var(--accent); background: var(--bg-3); }
  .opt.correct { border-color: var(--ok); background: rgba(200,255,43,0.06); }
  .opt.wrong { border-color: var(--err); background: rgba(255,77,109,0.06); }
  .opt:disabled { cursor: default; }
  .opt .marker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-faint);
    background: var(--bg-2); padding: 2px 7px;
    flex-shrink: 0; margin-top: 1px;
  }

  /* Flashcard */
  .flashcard {
    background: var(--bg-2); border: 1px solid var(--border);
    padding: 60px 40px; min-height: 320px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; user-select: none;
    text-align: center; position: relative;
  }
  .flashcard .side-label {
    position: absolute; top: 16px; left: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text-faint);
  }
  .flashcard .hint-flip {
    position: absolute; bottom: 16px; right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-faint);
  }
  .flashcard .content {
    font-family: 'Fraunces', serif;
    font-size: 32px; font-weight: 500; line-height: 1.3;
    font-variation-settings: 'opsz' 72;
  }
  .flashcard .content.small { font-size: 18px; line-height: 1.5; }

  /* Result screen */
  .result {
    background: var(--bg-2); border: 1px solid var(--border);
    padding: 40px; text-align: center;
  }
  .result .big-score {
    font-family: 'Fraunces', serif;
    font-size: 96px; font-weight: 900;
    line-height: 1; color: var(--accent);
    font-variation-settings: 'opsz' 144;
    margin: 16px 0;
  }
  .result .big-score .total { color: var(--text-faint); font-weight: 400; }
  .result .verdict {
    font-family: 'Fraunces', serif; font-size: 22px;
    font-style: italic; color: var(--text-dim); margin-bottom: 28px;
  }
  .result-breakdown {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: var(--border); margin: 32px 0;
    border: 1px solid var(--border);
  }
  .rb-cell { background: var(--bg); padding: 16px; }
  .rb-cell .lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .rb-cell .val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px; color: var(--text); margin-top: 4px;
  }

  /* Footer */
  .controls {
    margin-top: 24px; display: flex; justify-content: space-between;
    align-items: center; flex-wrap: wrap; gap: 12px;
  }
  .direction-toggle {
    display: flex; gap: 0; border: 1px solid var(--border);
  }
  .direction-toggle button {
    background: var(--bg-2); color: var(--text-dim);
    border: none; padding: 8px 14px; cursor: pointer;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    transition: all 0.15s ease;
  }
  .direction-toggle button.active {
    background: var(--accent); color: var(--bg); font-weight: 600;
  }

  /* Definition list (review) */
  .review-list { margin-top: 24px; }
  .review-item {
    background: var(--bg-2); border: 1px solid var(--border);
    padding: 18px 20px; margin-bottom: 8px;
  }
  .review-item .q {
    font-family: 'Fraunces', serif; font-size: 18px;
    margin-bottom: 8px; font-weight: 600;
  }
  .review-item .a {
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    color: var(--text-dim);
  }
  .review-item.miss { border-left: 3px solid var(--err); }
  .review-item.hit { border-left: 3px solid var(--ok); }
  .review-item .your {
    margin-top: 6px; font-size: 12px; color: var(--err);
    font-family: 'JetBrains Mono', monospace;
  }

  /* Reset button */
  .reset-row {
    margin-top: 40px; text-align: center;
    padding-top: 24px; border-top: 1px solid var(--border);
  }
  .reset-btn {
    background: none; border: none; color: var(--text-faint);
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    cursor: pointer; text-decoration: underline;
  }
  .reset-btn:hover { color: var(--err); }

  /* Self-grade */
  .self-grade-info {
    background: var(--bg-3); padding: 14px 16px;
    border-left: 3px solid var(--warn); margin-top: 24px;
    font-size: 13px; color: var(--text-dim);
  }
  .self-grade-info strong { color: var(--text); }

  @media (max-width: 640px) {
    .app { padding: 20px 16px 60px; }
    .header h1 { font-size: 28px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .modes { grid-template-columns: 1fr; }
    .qtext { font-size: 24px; }
    .qcard { padding: 28px 22px; }
    .flashcard { padding: 40px 24px; }
    .result .big-score { font-size: 64px; }
    .result-breakdown { grid-template-columns: 1fr; }
  }

  /* Keyboard hint */
  .kbd {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    background: var(--bg-3); border: 1px solid var(--border-2);
    padding: 1px 6px; color: var(--text-dim);
  }
</style>
</head>
<body>
<div class="app">

<!-- =============== HOME =============== -->
<div id="screen-home" class="screen active">
  <div class="header">
    <h1>КМ<span class="accent">2</span> · Подготовка</h1>
    <div class="sub">МИРЭА · Английский</div>
  </div>

  <div class="stats" id="home-stats">
    <div class="stat"><div class="num" id="stat-total">0</div><div class="lbl">всего слов</div></div>
    <div class="stat"><div class="num" id="stat-seen">0</div><div class="lbl">пройдено</div></div>
    <div class="stat"><div class="num" id="stat-mastered">0</div><div class="lbl">выучено</div></div>
    <div class="stat"><div class="num" id="stat-acc">—</div><div class="lbl">точность</div></div>
  </div>

  <div class="modes">
    <button class="mode featured" data-mode="exam">
      <div class="mode-num">[01] · 13 баллов · симуляция</div>
      <div class="mode-title">Полная симуляция КМ2</div>
      <div class="mode-desc">25 переводов + 10 аббревиатур + 6 определений. Случайная выборка, оценка по баллам, разбор ошибок в конце.</div>
      <span class="mode-arrow">→</span>
    </button>

    <button class="mode" data-mode="translate">
      <div class="mode-num">[02] · 280 слов</div>
      <div class="mode-title">Перевод</div>
      <div class="mode-desc">Тренировка лексики. Переключение RU↔EN. Адаптивно показывает слабые места.</div>
      <span class="mode-arrow">→</span>
    </button>

    <button class="mode" data-mode="abbr">
      <div class="mode-num">[03] · 99 сокращений</div>
      <div class="mode-title">Аббревиатуры</div>
      <div class="mode-desc">Расшифровка: BIOS → Basic Input/Output System. Ввод от руки, лояльная проверка.</div>
      <span class="mode-arrow">→</span>
    </button>

    <button class="mode" data-mode="define">
      <div class="mode-num">[04] · 100+ терминов</div>
      <div class="mode-title">Определения</div>
      <div class="mode-desc">Тест: дано определение — выбери термин (4 варианта). Готовит к третьей части КМ.</div>
      <span class="mode-arrow">→</span>
    </button>

    <button class="mode" data-mode="flash">
      <div class="mode-num">[05] · быстрое повторение</div>
      <div class="mode-title">Карточки</div>
      <div class="mode-desc">Свободный просмотр без оценки. Клик — переворот, стрелки — навигация. Для быстрой прогонки.</div>
      <span class="mode-arrow">→</span>
    </button>
  </div>

  <div class="reset-row">
    <button class="reset-btn" id="reset-stats">сбросить статистику</button>
  </div>
</div>

<!-- =============== QUIZ SCREEN =============== -->
<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <button class="quiz-back" onclick="goHome()">← назад</button>
    <div class="quiz-progress"><span class="cur" id="q-cur">1</span> / <span id="q-total">10</span></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="q-progress"></div></div>

  <div id="q-direction-toggle"></div>

  <div class="qcard">
    <div class="qtype" id="q-type">Перевод RU → EN</div>
    <div class="qtext" id="q-text">—</div>
    <div class="qhint" id="q-hint" style="display:none"></div>
  </div>

  <div class="answer-area" id="q-answer-area"></div>
  <div id="q-feedback"></div>

  <div class="btn-row" id="q-buttons"></div>
</div>

<!-- =============== FLASHCARD SCREEN =============== -->
<div id="screen-flash" class="screen">
  <div class="quiz-header">
    <button class="quiz-back" onclick="goHome()">← назад</button>
    <div class="quiz-progress"><span class="cur" id="f-cur">1</span> / <span id="f-total">280</span></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="f-progress"></div></div>

  <div id="f-deck-picker" class="btn-row" style="margin-bottom: 20px;"></div>

  <div class="flashcard" id="flashcard" onclick="flipCard()">
    <div class="side-label" id="f-side">RU</div>
    <div class="content" id="f-content">—</div>
    <div class="hint-flip">клик / <span class="kbd">space</span></div>
  </div>

  <div class="btn-row">
    <button class="btn ghost" onclick="prevCard()">← <span class="kbd">←</span></button>
    <button class="btn" onclick="shuffleCards()">⇄ перемешать</button>
    <button class="btn ghost" onclick="nextCard()"><span class="kbd">→</span> →</button>
  </div>
</div>

<!-- =============== RESULT SCREEN =============== -->
<div id="screen-result" class="screen">
  <div class="quiz-header">
    <button class="quiz-back" onclick="goHome()">← в начало</button>
  </div>
  <div class="result">
    <div class="qtype" id="result-mode">КМ2 · симуляция</div>
    <div class="big-score">
      <span id="result-score">0</span><span class="total" id="result-max">/13</span>
    </div>
    <div class="verdict" id="result-verdict">—</div>

    <div class="result-breakdown" id="result-breakdown" style="display:none">
      <div class="rb-cell"><div class="lbl">Перевод (5)</div><div class="val" id="rb-1">0/25</div></div>
      <div class="rb-cell"><div class="lbl">Аббревиатуры (2)</div><div class="val" id="rb-2">0/10</div></div>
      <div class="rb-cell"><div class="lbl">Определения (6)</div><div class="val" id="rb-3">0/6</div></div>
    </div>

    <div class="btn-row" style="justify-content: center;">
      <button class="btn primary" id="result-retry">пройти ещё раз</button>
      <button class="btn" onclick="goHome()">в главное меню</button>
    </div>
  </div>

  <div class="review-list" id="result-review"></div>
</div>

</div>

<script src="data.js"></script>
<script src="logic.js"></script>
</body>
</html>
